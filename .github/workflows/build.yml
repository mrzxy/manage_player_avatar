name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name 选手头像管理工具 app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 选手头像管理工具-windows
          path: dist/选手头像管理工具.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build App
        run: pyinstaller --onefile --windowed --name 选手头像管理工具 app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 选手头像管理工具-macos
          path: dist/选手头像管理工具
          retention-days: 30
